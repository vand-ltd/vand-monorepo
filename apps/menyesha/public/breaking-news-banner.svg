<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a2e"/>
      <stop offset="100%" style="stop-color:#003153"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C41E3A"/>
      <stop offset="100%" style="stop-color:#E11D48"/>
    </linearGradient>
    <filter id="amberglow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentLine)"/>

  <!-- 
    Signal icon: dot at cy=530 (near bottom), arcs sweep up filling the whole canvas
    cx=600 centered horizontally
  -->
  <g filter="url(#amberglow)">
    <!-- Arc 4 — largest -->
    <path d="M 250 330 A 390 390 0 0 1 950 330"
          stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.15"/>

    <!-- Arc 3 -->
    <path d="M 340 362 A 290 290 0 0 1 860 362"
          stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.3"/>

    <!-- Arc 2 -->
    <path d="M 420 388 A 200 200 0 0 1 780 388"
          stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- Arc 1 — smallest, amber -->
    <path d="M 490 410 A 120 120 0 0 1 710 410"
          stroke="#F59E0B" stroke-width="12" stroke-linecap="round" fill="none"/>

    <!-- Center dot -->
    <circle cx="600" cy="430" r="20" fill="#F59E0B"/>
  </g>

  <!-- BREAKING NEWS pill — centered in the middle of image -->
  <rect x="390" y="286" width="420" height="58" rx="29" fill="url(#redGrad)"/>
  <circle cx="426" cy="315" r="9" fill="white">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="324"
        font-family="Georgia, serif"
        font-size="24"
        font-weight="700"
        letter-spacing="5"
        text-anchor="middle"
        fill="white">BREAKING NEWS</text>

  <!-- Bottom bar -->
  <rect x="0" y="553" width="1200" height="77" fill="#001220" opacity="0.9"/>

  <!-- Broadcast icon small in bottom bar -->
  <circle cx="88" cy="591" r="7" fill="#F59E0B"/>
  <path d="M 101 576 A 20 20 0 0 1 101 606" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 113 568 A 31 31 0 0 1 113 614" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Menyesha wordmark -->
  <text x="138" y="599"
        font-family="Georgia, serif"
        font-size="28"
        font-weight="700"
        fill="white">Menyesha</text>

  <!-- Divider -->
  <line x1="298" y1="571" x2="298" y2="611" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>

  <!-- Domain -->
  <text x="316" y="599"
        font-family="Georgia, serif"
        font-size="17"
        fill="#64748B"
        letter-spacing="1">menyesha.vand.rw</text>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accentLine)"/>
</svg>
